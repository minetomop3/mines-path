<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a2a6c"/>
      <stop offset="35%"  stop-color="#5b3a7a"/>
      <stop offset="65%"  stop-color="#c44a2a"/>
      <stop offset="90%"  stop-color="#f08038"/>
      <stop offset="100%" stop-color="#ffd060"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,220,80,0.55)"/>
      <stop offset="40%"  stop-color="rgba(255,140,30,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,80,0,0)"/>
    </radialGradient>
    <radialGradient id="ovenGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%"   stop-color="rgba(255,120,20,0.85)"/>
      <stop offset="100%" stop-color="rgba(255,60,0,0)"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="50%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="441" fill="url(#sky)"/>
  <!-- Ground -->
  <rect y="441" width="1200" height="189" fill="#050c04"/>

  <!-- Stars (top region) -->
  <g fill="#fff8d8" opacity="0.7">
    <circle cx="80"   cy="40"  r="1.2"/>
    <circle cx="180"  cy="80"  r="0.8"/>
    <circle cx="260"  cy="30"  r="1"/>
    <circle cx="340"  cy="110" r="0.7"/>
    <circle cx="450"  cy="55"  r="1.1"/>
    <circle cx="560"  cy="95"  r="0.9"/>
    <circle cx="700"  cy="40"  r="0.7"/>
    <circle cx="820"  cy="70"  r="1"/>
    <circle cx="960"  cy="35"  r="0.8"/>
    <circle cx="1080" cy="90"  r="1.2"/>
    <circle cx="1140" cy="50"  r="0.7"/>
  </g>

  <!-- Sun glow -->
  <circle cx="780" cy="380" r="240" fill="url(#sunGlow)"/>
  <!-- Sun disk -->
  <circle cx="780" cy="380" r="42" fill="#ffd750"/>

  <!-- Far hill -->
  <path d="M 0 460 C 200 380, 400 430, 600 410 C 800 380, 1000 440, 1200 420 L 1200 630 L 0 630 Z"
        fill="rgba(8,18,6,0.78)"/>

  <!-- Near hill -->
  <path d="M 0 510 C 150 460, 350 490, 540 470 C 720 450, 900 490, 1200 480 L 1200 630 L 0 630 Z"
        fill="rgba(4,10,3,0.92)"/>

  <!-- Cypress trees (left) -->
  <g fill="#081408">
    <polygon points="120,420 108,470 115,470 116,520 124,520 125,470 132,470"/>
    <polygon points="160,440 150,485 156,485 157,530 163,530 164,485 170,485"/>
  </g>
  <!-- Cypress trees (right) -->
  <g fill="#081408">
    <polygon points="1050,415 1038,468 1045,468 1046,520 1054,520 1055,468 1062,468"/>
    <polygon points="1095,440 1085,485 1091,485 1092,530 1098,530 1099,485 1105,485"/>
  </g>

  <!-- Pizza oven -->
  <g>
    <rect x="900" y="490" width="140" height="32" fill="#110800"/>
    <path d="M 905 490 Q 970 415, 1035 490 Z" fill="#1a0d00"/>
    <!-- Oven opening glow -->
    <ellipse cx="970" cy="495" rx="28" ry="20" fill="url(#ovenGlow)"/>
    <!-- Smoke wisps -->
    <g fill="rgba(200,180,150,0.35)">
      <circle cx="970" cy="395" r="10"/>
      <circle cx="978" cy="365" r="13" opacity="0.6"/>
      <circle cx="965" cy="330" r="17" opacity="0.4"/>
      <circle cx="982" cy="290" r="22" opacity="0.25"/>
    </g>
  </g>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Title text -->
  <text x="600" y="280" text-anchor="middle"
        font-family="'DotGothic16', 'Noto Serif JP', serif"
        font-size="84" font-weight="700"
        fill="#ffe9b0" letter-spacing="0.3em"
        style="text-shadow: 0 0 30px rgba(212,160,23,0.7);">あくる日</text>
  <text x="600" y="325" text-anchor="middle"
        font-family="'DotGothic16', sans-serif"
        font-size="20" fill="#c4a882" letter-spacing="0.5em">掌編小説</text>
</svg>
